# Tidepool compatibility pins.
#
# This file is the one source of truth for "which upstream versions
# has this release of Tidepool been tested against?" It is:
#
#   1. Parsed at compile time (via `include_str!`) and surfaced through
#      `tidepool_info`'s response under `result.compatibility`. Clients
#      asking the running server what it speaks get the pins live.
#   2. Shown in the CLI `--version` output so users see it without
#      ever calling the server.
#   3. Validated in release preflight — a version bump that doesn't
#      touch this file (either confirming tested ranges or updating
#      them) hard-fails CI. Forces a "yes, we re-tested" decision
#      before every release.
#
# Versions here are SemVer ranges, interpreted in npm/Cargo style:
#   - "^1.6"        → compatible with 1.6.0 through <2.0.0
#   - ">=1.6, <2"   → the same, explicit
#   - "=0.12.3"     → locked to exact
#   - "any"         → no constraint; useful during rapid upstream churn
#
# Never leave a field blank. Use "any" + a `note` explaining why if
# you genuinely can't pin something today.

[tested-against]

# v0.1.0 (2026-05-26): first published release; pins below are
# verified as-tested against the listed upstreams.
#
# v0.1.1 (2026-05-26): first CI-driven release via OIDC trusted
# publishing; no upstream pin changes since 0.1.0.
#
# v0.1.2 (2026-05-26): crates lockstep release; npm publish blocked
# on artifact layout. No upstream pin changes since 0.1.1.
#
# v0.1.3 (2026-05-26): fixed artifact layout; npm still failed at
# the multi-package assemble step. No upstream pin changes.
#
# v0.1.4 (2026-05-26): fat-package npm layout; publish still failed
# (Node 22 / npm 10 OIDC handshake bug). No upstream pin changes.
#
# v0.1.5 (2026-05-26): bumped CI Node to 24 (npm 11.5+) so the OIDC
# handshake actually completes. No upstream pin changes.
#
# v0.2.0 (2026-05-27): cleanup release. WS polyfill replaced by
# reverse proxy onto Surfpool's native subs (v1.1+); pin tightened
# from "any" to ">=1.1, <2". Repo refs updated to the new
# solana-foundation/surfpool org.

# Surfpool is Tidepool's intended upstream. Users *can* run against
# `solana-test-validator` or any mainnet RPC, but we only verify
# against Surfpool in release preflight.
surfpool = { version = ">=1.1, <2", url = "https://github.com/solana-foundation/surfpool", note = "WS subscriptions (v1.1+) required — Tidepool's WS port is a reverse proxy onto Surfpool's native subs" }

# helius-sdk is the JS consumer we care most about interop with.
# When we bump, we verify that the current helius-sdk release resolves
# against our wire shapes via the drift fixtures.
"helius-sdk" = { version = "^1.6", url = "https://github.com/helius-labs/helius-sdk", note = "REST base-URL override lands in a PR we assume merges" }

# Solana client version we test our passthrough against. Not a hard
# constraint — passthrough is transport-level — but a useful stamp
# for "what network features did this release target?"
solana = { version = ">=1.18, <2.1", url = "https://github.com/anza-xyz/agave" }

# Rust MSRV. Enforced by `rust-version` in the workspace manifest,
# duplicated here for `tidepool_info` surfacing.
rust = { version = ">=1.77" }

[runtime]

# Minimum Node version the `@vibestackmd/tidepool` npm package supports. Set
# by `engines.node` in crates/node/package.json — mirrored here for
# the same cross-surface visibility.
node = { version = ">=18" }
