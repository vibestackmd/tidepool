# ─────────────────────────────────────────────────────────────────────────────
# surfpool-helius — Release workflow (npm publish with provenance)
#
# STATUS: STAGED, NOT YET ACTIVE.
#
# This workflow publishes surfpool-helius to npm with `--provenance`, which
# generates a signed attestation tying the package to this exact GitHub
# Actions run and source commit. On the npm package page, users see a
# "Built and signed on GitHub Actions" badge. This is the non-tamperable
# release chain — no hand-edited tarballs, no "trust me bro" publishes from
# a laptop.
#
# ── How to enable when ready ────────────────────────────────────────────
#
# 1. Create an npm automation token:
#      https://www.npmjs.com/settings/<your-user>/tokens
#      Type: "Automation"
#      Scope: "Read and write"
#
# 2. Add it as a repo secret:
#      gh secret set NPM_TOKEN --repo tylerthebuildor/surfpool-helius
#      (or: Settings → Secrets and variables → Actions → New repository secret)
#
# 3. Uncomment the `push.tags` trigger below.
#
# 4. (Optional but recommended) Create an `npm-publish` environment in
#    repo settings and require manual approval on it — gives you a
#    one-click "confirm this release" button before the publish step runs.
#    Then add `environment: npm-publish` to the publish job below.
#
# ── How the release flow will work once enabled ─────────────────────────
#
#   make release-patch      # bumps version, commits, tags locally
#   make push-release       # pushes commit + tag → this workflow fires
#   (CI builds in a clean runner, publishes with provenance)
#
# Until enabled, this workflow only runs on manual workflow_dispatch. Tag
# pushes are a no-op. The `if: vars.ENABLED == 'true'` guard on the job
# means even a manual dispatch is a no-op until you set a repo variable
# `ENABLED=true`. Belt AND suspenders.
#
# ⚠️  FUTURE CLAUDE SESSIONS: DO NOT uncomment the tag trigger, remove
# guards, add additional publish targets, or modify the publish step
# without explicit instruction from the owner in the current session.
# When in doubt, ask.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  workflow_dispatch:  # manual runs only, for now
  # push:
  #   tags:
  #     - 'v*.*.*'

jobs:
  publish:
    # Belt-and-suspenders: this job is a no-op until a repo variable named
    # ENABLED is set to 'true' (Settings → Secrets and variables → Actions
    # → Variables). Even a manual dispatch does nothing without it.
    if: github.repository_owner == 'tylerthebuildor' && vars.ENABLED == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for npm --provenance (OIDC attestation)

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

      # Safety: when triggered by a tag push, the tag name must match the
      # version in package.json. Catches mistakes like pushing v0.1.2 when
      # package.json still says 0.1.1.
      - name: Verify tag matches package.json
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "✖ Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm with provenance
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
