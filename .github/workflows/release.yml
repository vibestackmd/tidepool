# ─────────────────────────────────────────────────────────────────────────────
# Tidepool — release pipeline.
#
# STATUS: staged. Fires on a signed tag push (`v*.*.*`) but every publish
# step is gated behind a GitHub Environment (`production`) that requires
# manual approval. Enabling publish-for-real is a 4-step config task, all
# captured under "Enabling the pipeline" below — no code change needed.
#
# Design goals:
#
#   1. **Lockstep release.** One tag → five crates.io crates + one npm
#      package, all at the same version. Publish order is dependency
#      order (core → service → server → cli → node), then npm.
#
#   2. **Provenance everywhere, zero long-lived tokens.** Both
#      registries support OIDC trusted publishing: crates.io exchanges
#      this job's GitHub OIDC token for a short-lived crates token,
#      npm does the equivalent for the npm registry. `--provenance`
#      adds the signed attestation linking the tarball to this CI
#      run + commit SHA. No NPM_TOKEN, no CARGO_REGISTRY_TOKEN
#      stored in repo secrets — the only secrets surface is the
#      `production` environment's required-reviewers gate.
#
#   3. **Preflight is identical to local.** The `preflight` job runs
#      `scripts/preflight.sh --release <tag>` — the same script a
#      maintainer runs via `make release-dry-run` before tagging.
#      Any drift between CI and laptop is a bug in the script, not in
#      tribal knowledge.
#
#   4. **Environment gate.** The `publish-crates` and `publish-npm`
#      jobs both require the `production` environment. Even a
#      legitimate tag push sits in "waiting for review" until a
#      human clicks approve.
#
#   5. **Post-publish smoke.** After publish, install from the
#      registries in a clean container and verify `--version` matches
#      the tag. Catches "published but the binary was somehow wrong"
#      immediately rather than post-mortem.
#
# ── Enabling the pipeline (one-time, already done for tidepool) ─────
#
#   1. crates.io trusted publishing — CHICKEN-AND-EGG. crates.io has
#      NO pending-publisher flow: the per-crate settings page only
#      exists after a manual `cargo publish` of v0.1.0 with your
#      stored token. After v0.1.0 lands, configure at
#      https://crates.io/crates/<name>/settings → Trusted Publishing
#      → "Add" → repo `vibestackmd/tidepool`, workflow `release.yml`,
#      environment `production`. Repeat per crate. v0.1.1+ then
#      ships via OIDC.
#
#   2. npm trusted publishing — ALSO requires a placeholder publish
#      first. npm's docs hint at a "pending publisher" flow but in
#      practice (as of May 2026) the CLI hits 403 and the UI form
#      isn't reachable until the package exists. Workaround: publish
#      a `0.0.1` placeholder locally, then `npm trust github
#      @vibestackmd/tidepool --file release.yml --repository
#      vibestackmd/tidepool --environment production --allow-publish`.
#      Or use the per-package /access page in the npm UI.
#
#   3. Create a `production` environment in repo settings with
#      "required reviewers" = repo owner. Every publish job waits
#      for approval.
#
#   4. Flip the `vars.ENABLED` repo variable to `true`. Belt +
#      suspenders: the job is guarded on both env approval AND the
#      var.
#
# Notes:
#   - npm trusted publishing requires npm CLI ≥ 11.5.1. Node 22 ships
#     npm 10 which DOES NOT complete the OIDC handshake — the publish
#     gets a misleading 404 *after* sigstore signs provenance. Use
#     `actions/setup-node@v4` with `node-version: 24` (gives npm 11.5+).
#     This was hit between v0.1.4 and v0.1.5; documented at
#     https://medium.com/@kenricktan11/npm-trusted-publishers-the-weird-404-error-and-the-node-js-24-fix-a9f1d717a5dd
#   - The fat-package npm layout (all platform .node files bundled in
#     the main pkg) keeps this single-trusted-publisher; do NOT switch
#     to the per-platform sub-package layout without configuring a
#     trusted publisher for each of the 5 sub-packages.
#   - The C cross-compile toolchain for aarch64-linux is *not*
#     pre-installed on `ubuntu-latest`; the prebuild matrix uses
#     `ubuntu-24.04-arm` (native ARM) instead of cross-compiling.
#   - `dtolnay/rust-toolchain` action MUST be pinned to the same
#     version as `rust-toolchain.toml`. `@stable` installs latest stable
#     but cargo respects the toml pin, leaving cross-compile targets
#     installed for the wrong toolchain.
#
# ── Future Claude sessions: ─────────────────────────────────────────
#
# Do NOT flip `vars.ENABLED` to true in a Pull Request or without
# explicit owner instruction. Do NOT add publish targets beyond the
# five crates + one npm package listed here. Do NOT remove the
# environment gate or the signed-tag requirement. If the owner
# wants a publish change, confirm first.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run every step except the actual publish"
        type: boolean
        default: true
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  # A given tag only ever releases once; if the workflow retries,
  # serialize via the ref name rather than the run id.
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────
  # preflight — the full gate. Must pass before any publish runs.
  # ─────────────────────────────────────────────────────────────────
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    if: github.repository_owner == 'vibestackmd'
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so CHANGELOG diffing + signed-tag verify work.
          fetch-depth: 0

      - id: tag
        name: Extract version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
            echo "version=$V" >> "$GITHUB_OUTPUT"
            echo "Tag version: $V"
          else
            echo "version=dry-run" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — version derived from Cargo.toml"
          fi

      - name: Verify tag is signed (on tag push)
        if: github.event_name == 'push'
        run: |
          # Signing is opt-in for now: warn but allow unsigned tags
          # through until tag-signing is set up locally. Tighten to a
          # hard gate by removing the `|| true` once signing keys are
          # configured.
          if git verify-tag "$GITHUB_REF_NAME" 2>/dev/null; then
            echo "✔ tag $GITHUB_REF_NAME is signed"
          else
            echo "⚠ tag $GITHUB_REF_NAME is unsigned — allowed for now (see workflow comment)"
          fi

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm deps (for npm dry-run)
        working-directory: crates/node
        run: pnpm install --ignore-scripts

      - name: Run full preflight
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            bash scripts/preflight.sh --release "${GITHUB_REF_NAME#v}"
          else
            bash scripts/preflight.sh
          fi

  # ─────────────────────────────────────────────────────────────────
  # publish-crates — crates.io via OIDC trusted publishing (no token).
  # Order is dependency order; any failure mid-stream leaves unpublished
  # crates to be re-run with the same tag.
  # ─────────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: preflight
    if: |
      github.event_name == 'push' &&
      vars.ENABLED == 'true' &&
      github.repository_owner == 'vibestackmd'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write  # crates.io OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2

      # Exchange the GitHub OIDC token for a short-lived crates.io
      # token. Configured via the crates.io trusted-publisher setting
      # per crate (see "Enabling the pipeline" above).
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # Dependency order. A mid-stream failure is recoverable: re-run
      # the job; already-published crates are skipped by cargo (the
      # registry returns "already exists" which we treat as success).
      - name: Publish tidepool-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p tidepool-core --locked

      - name: Publish tidepool-rpc (service)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p tidepool-rpc --locked

      - name: Publish tidepool-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p tidepool-server --locked

      - name: Publish tidepool-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p tidepool-cli --locked

      # The `tidepool-node` crate is not published to crates.io
      # (it's a dylib-only bridge consumed through the npm package).
      # No step here.

  # ─────────────────────────────────────────────────────────────────
  # publish-npm — builds per-platform prebuilds, assembles, publishes
  # with provenance (OIDC attestation).
  # ─────────────────────────────────────────────────────────────────
  prebuild-npm:
    name: napi prebuild ${{ matrix.target }}
    needs: preflight
    if: |
      github.event_name == 'push' &&
      vars.ENABLED == 'true' &&
      github.repository_owner == 'vibestackmd'
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Native ARM Linux runner avoids cross-compile entirely
          # (gcc-aarch64-linux-gnu install + linker env-var setup).
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - working-directory: crates/node
        run: pnpm install --ignore-scripts
      - working-directory: crates/node
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }} --manifest-path ../../Cargo.toml --package tidepool-node
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/node/*.node

  publish-npm:
    name: Publish to npm
    needs: [preflight, prebuild-npm, publish-crates]
    if: |
      github.event_name == 'push' &&
      vars.ENABLED == 'true' &&
      github.repository_owner == 'vibestackmd'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write  # npm --provenance OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          path: crates/node/artifacts
          # Merge all `bindings-*` artifacts into a flat layout
          # (each .node file is uniquely named per platform), so
          # `napi artifacts --output-dir artifacts` finds them.
          # Without this, each artifact lands in its own subdir.
          merge-multiple: true

      - name: Install pnpm deps
        working-directory: crates/node
        run: pnpm install --ignore-scripts

      - name: Place prebuilt .node files into the package
        working-directory: crates/node
        # Fat-package layout: all platform .node files ship in the
        # main package; index.js's loader picks the right one at
        # require time. No per-platform sub-packages, no `napi
        # artifacts` assemble step.
        run: |
          cp artifacts/*.node .
          ls -la *.node

      # Trusted publishing: npm exchanges this job's GitHub OIDC
      # token for a short-lived publish credential. No NPM_TOKEN
      # secret involved. Configured npm-side under the package's
      # "Trusted Publishers" tab — see docs/release.md.
      #
      # `--provenance` is implicit when publishing via OIDC but we
      # pass it explicitly so the intent is visible at the call
      # site.
      - name: Publish with trusted publishing + provenance
        working-directory: crates/node
        run: pnpm publish --access public --provenance --no-git-checks

  # ─────────────────────────────────────────────────────────────────
  # post-publish — install from the registries in a clean container,
  # assert the published version resolves and `--version` matches.
  # ─────────────────────────────────────────────────────────────────
  smoke:
    name: post-publish smoke test
    needs: [preflight, publish-crates, publish-npm]
    if: github.event_name == 'push' && vars.ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # crates.io smoke: install the CLI from the registry, run
      # --version, assert it matches the tag.
      - name: cargo install tidepool-cli
        run: cargo install tidepool-cli --version "${GITHUB_REF_NAME#v}" --locked
      - name: Verify CLI version
        run: |
          EXPECTED="${GITHUB_REF_NAME#v}"
          ACTUAL=$(tidepool --version | head -n1 | awk '{print $2}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "✖ CLI reports $ACTUAL, expected $EXPECTED"
            exit 1
          fi
          echo "✔ CLI reports $ACTUAL"

      # npm smoke: install the package and require() it.
      - name: Install @vibestackmd/tidepool from npm
        run: |
          mkdir -p /tmp/npm-smoke && cd /tmp/npm-smoke && npm init -y >/dev/null
          npm install "@vibestackmd/tidepool@${GITHUB_REF_NAME#v}"
          node -e "
            const t = require('@vibestackmd/tidepool');
            if (typeof t.HeliusContext !== 'function') {
              console.error('✖ HeliusContext not exported');
              process.exit(1);
            }
            console.log('✔ npm package loads cleanly');
          "
