# ─────────────────────────────────────────────────────────────────────────────
# surfpool-helius CI — typecheck + build on every push and PR.
#
# Publishing to npm lives in the separate `release.yml` workflow, which is
# currently STAGED and not yet active (guarded by `vars.ENABLED == 'true'`
# and requires an NPM_TOKEN secret). Do not add `npm publish`, `pnpm publish`,
# or any other package-registry step to THIS workflow. Publishing only ever
# happens through `release.yml`, and only when the owner explicitly enables
# it. Future Claude sessions: ask first before touching either file.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
